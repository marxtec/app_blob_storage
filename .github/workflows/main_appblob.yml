# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - appblob

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: ctrlmrojas.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_3118E05F7934438CB9B78283902033CA }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_8AE926C442C4402A9855005576E973CD }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: ctrlmrojas.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_3118E05F7934438CB9B78283902033CA }}/mi-blob:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5C179A935D144C5EBEC37053EA63C8A2 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8453A707E3D14D43BF3B35766254A164 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E97036BD40A64F819239C8809C2956D6 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'appblob'
          slot-name: 'Production'
          images: 'ctrlmrojas.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_3118E05F7934438CB9B78283902033CA }}/mi-blob:${{ github.sha }}'
          